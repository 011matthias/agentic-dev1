[pytest]
# Enforcement-layer test suite. Lives at repo root as pytest.ini (NOT
# pyproject.toml) on purpose: a root pyproject.toml would flip `uv run` into
# project mode and change how every `uv run python .claude/hooks/X.py` hook
# invocation resolves. pytest.ini is read by pytest only and is invisible to uv.
testpaths = tools/tests
python_files = test_*.py
python_functions = test_*
addopts = -q
