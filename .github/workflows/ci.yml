name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  hooks:
    name: Enforcement hook tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - name: Ruff (real-bug ruleset)
        run: uv run --no-project --with ruff ruff check tools .claude/hooks tools/tests
      - name: tools/INDEX.md membership
        run: uv run tools/check-index.py
      - name: Run enforcement-layer test suite
        run: uv run --no-project --with pytest pytest tools/tests

  crew:
    name: CREW build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: products/crew
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: products/crew/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
