<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="CREW">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#5a3fd6"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background: safe for maskable icons -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- the crew, formed as a ring, with a break on the right -->
  <path d="M 378.9 170.0 A 150 150 0 1 0 378.9 342.0"
        fill="none" stroke="#ffffff" stroke-width="46" stroke-linecap="round"/>
  <!-- the impostor: the one sitting in the gap -->
  <circle cx="406" cy="256" r="30" fill="#ff5577" stroke="#0e0e14" stroke-width="6"/>
</svg>
