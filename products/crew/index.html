<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Pinch-zoom re-enabled (was user-scalable=no, a WCAG 1.4.4 failure). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0e14" />
    <meta name="color-scheme" content="dark" />

    <!-- Chunky party display type, self-hosted so the offline PWA stays on-brand:
         Luckiest Guy (wordmark + verdicts), Fredoka (UI). @font-face in styles.css. -->
    <link rel="preload" href="/fonts/luckiest-guy.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/fredoka-500.woff2" as="font" type="font/woff2" crossorigin />

    <title>CREW - Impostor</title>
    <meta
      name="description"
      content="One phone, passed around. Everyone gets the secret word except the impostor. Give clues, find the faker. A pass-and-play party game for 4+ players, no accounts, works offline."
    />

    <!-- Installable, full-screen, app-like on a phone -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CREW" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="icon" href="/icon-192.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Share preview (Open Graph + Twitter) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CREW - Impostor" />
    <meta
      property="og:description"
      content="One phone, passed around. Everyone gets the secret word except the impostor. Give clues, find the faker."
    />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CREW - Impostor" />
    <meta
      name="twitter:description"
      content="A pass-and-play party game. Everyone gets the secret word except the impostor. Find them."
    />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
