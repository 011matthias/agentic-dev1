# Real-bug ruleset for the Python layer (tools/, .claude/hooks/, tools/tests/).
#
# Intentionally ruff.toml, NOT pyproject.toml: a root pyproject would flip
# `uv run` into project mode and change how every `uv run python .claude/hooks/X.py`
# invocation resolves. ruff reads ruff.toml; uv ignores it.
#
# Scope is deliberately the real-bug classes (pyflakes F + syntax E9), not full
# style. The 11 pre-existing E741 (ambiguous variable name) findings are NOT
# selected, so introducing this gate does not churn the existing codebase or
# the freshly-rewritten security hooks. Style tightening is a later, deliberate
# pass.
line-length = 100
extend-exclude = [".tmp", "**/__pycache__", ".venv", "node_modules", "platform"]

[lint]
select = ["E9", "F"]

[lint.per-file-ignores]
# Pre-existing F841 (unused local `draft_text`) in a validator. Left for a
# deliberate review rather than blind-fixed here, since touching validator logic
# without reading its intent risks a real regression. Tracked, not ignored-forever.
"tools/validate-output.py" = ["F841"]
